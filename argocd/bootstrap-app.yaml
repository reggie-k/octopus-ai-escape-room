apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo-escape-room-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/reggie-k/octopus-ai-escape-room.git
    targetRevision: main
    path: argocd/applications
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
